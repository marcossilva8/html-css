<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Tags HTML</title>
</head>
<body>
    <h1>Tags em HTML</h1>   
    <p>Em HTML5, podemos inserir os elemntos da lista a seguir. Passe o mouse <br>
         sobre os termos para descobrir qual tag deverá utilizar em cada caso</p> 
        <ul type="square">
            <li><abbr title="Use a tag <p>">Parágrafos</abbr></li>

            <li><abbr title="Use a tag <img>">Imagens</abbr></li>
            <li><abbr title="Use a tag <abbr>">Abreviações</abbr></li>
            <li><abbr title="Use a tag <code>">Códigos-fontes</abbr></li>
            <li><abbr title="Use a tag <ol>">Listas numeradas</abbr></li>
            <li><abbr title="Use a tag <ul>">Listas com demarcadores</abbr></li>
        </ul>
</body>
