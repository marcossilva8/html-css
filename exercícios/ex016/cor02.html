<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Gradiente em CSS</title>
    <style>
        * { /* Configurações globais do CSS */
            height: 100%;
        }
        body {
            background-image: linear-gradient(to bottom, #CBF7BB, #94F570, #75C259);
            background-attachment: fixed;
        }
        h1 {
            color: #335926;
        }
    </style>
</head>
<body>
    <h1>Testando Gradientes</h1>   
</body>
</html>
